const { useState, useEffect, useCallback, useRef } = React;

// ─────────────────────────────────────────────────────────────
// Real shared storage: talks to the Netlify Function (Blobs-backed).
// Same contract the app expects — get() THROWS on a missing key.
// ─────────────────────────────────────────────────────────────
window.storage = {
  async _call(payload) {
    const r = await fetch("/.netlify/functions/storage", {
      method: "POST",
      headers: { "content-type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify(payload),
    });
    let data = null;
    try { data = await r.json(); } catch (_) { /* non-JSON */ }
    if (r.status === 404) { const e = new Error("Key not found"); e.notFound = true; throw e; }
    if (!r.ok) throw new Error((data && data.error) || ("storage " + payload.op + " failed (" + r.status + ")"));
    return data;
  },
  get(key, shared = false) { return this._call({ op: "get", key, shared }); },
  set(key, value, shared = false) { return this._call({ op: "set", key, value, shared }); },
  list(prefix = "", shared = false) { return this._call({ op: "list", prefix, shared }); },
  delete(key, shared = false) { return this._call({ op: "delete", key, shared }); },
};

// Real shared-storage round-trip self-test, surfaced by the Leader → "Test
// connection" button. Writes a probe key with shared:true, reads it back, and
// reports exactly which stage fails so a silent storage failure is visible.
window.WARRIOR_DIAG = async () => {
  const probe = "warrior:diag:probe";
  const token = "diag-" + Date.now();
  let stage = "write";
  try {
    await window.storage.set(probe, token, true);
    stage = "read";
    const res = await window.storage.get(probe, true);
    stage = "verify";
    if (!res || res.value !== token) {
      return {
        ok: false,
        stage,
        msg: res
          ? "Wrote a test value but read back something different — shared storage isn't round-tripping."
          : "Wrote a test value but read back nothing — shared storage isn't persisting.",
      };
    }
    return { ok: true };
  } catch (e) {
    return { ok: false, stage, msg: String((e && e.message) || e) };
  }
};

const emptyState = {
  members: [],
  messages: [],
  checkins: [],
  prayers: [],
  quiet: [],
  scriptures: [],
  moments: [],
  reads: {},    // { name: [ "2026-06-11", ... ] } daily Bible-reading log
  presence: {}, // { name: lastSeenTs }
  weekStart: null, // current EMAW week (Tuesday date), label only — no auto-reset
};

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

// local YYYY-MM-DD for "today" comparisons
function dayKey(ts = Date.now()) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// last 7 day-keys, oldest → newest
function last7Days() {
  const out = [];
  for (let i = 6; i >= 0; i--) out.push(dayKey(Date.now() - i * 86400000));
  return out;
}

// consecutive-day streak ending today (or yesterday, grace)
function streakOf(days = []) {
  const set = new Set(days);
  let streak = 0;
  let cursor = Date.now();
  if (!set.has(dayKey(cursor))) cursor -= 86400000;
  while (set.has(dayKey(cursor))) {
    streak++;
    cursor -= 86400000;
  }
  return streak;
}

// "EMAW week" starts Tuesday 12:00 AM America/New_York. Used only as a label
// for the current week — it NO LONGER auto-wipes anything (see normalizeWeek).
function currentWeekStart(now = new Date()) {
  const tz = "America/New_York";
  const parts = new Intl.DateTimeFormat("en-US", { timeZone: tz, weekday: "short", year: "numeric", month: "2-digit", day: "2-digit" }).formatToParts(now);
  const map = {};
  for (const p of parts) map[p.type] = p.value;
  const idx = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].indexOf(map.weekday);
  const daysSinceTue = (idx - 2 + 7) % 7;
  const base = new Date(Date.UTC(Number(map.year), Number(map.month) - 1, Number(map.day)));
  base.setUTCDate(base.getUTCDate() - daysSinceTue);
  return `${base.getUTCFullYear()}-${String(base.getUTCMonth() + 1).padStart(2, "0")}-${String(base.getUTCDate()).padStart(2, "0")}`;
}

// Remove truly-identical roster entries (after trimming/collapsing whitespace),
// which heals the accidental double-add. Case-SENSITIVE on purpose: "Jake" and
// "Big Jake" — or even two men who type "Jake" vs "jake" — stay separate people.
function dedupeMembers(arr) {
  const seen = new Set();
  const out = [];
  for (const raw of (Array.isArray(arr) ? arr : [])) {
    if (typeof raw !== "string") continue;
    const name = raw.trim().replace(/\s+/g, " ");
    if (!name) continue;
    if (seen.has(name)) continue;
    seen.add(name);
    out.push(name);
  }
  return out;
}

// Fill in any missing fields and de-dup the roster. IMPORTANT: this never
// discards activity. The week only resets when the leader taps "Start fresh
// week" — nothing disappears on its own anymore.
function normalizeWeek(state) {
  const s = state || {};
  return { ...emptyState, ...s, members: dedupeMembers(s.members), weekStart: s.weekStart || currentWeekStart() };
}

function App() {
  const savedName =
    typeof window !== "undefined" && window.localStorage
      ? window.localStorage.getItem("warrior:myname")
      : null;
  const [name, setName] = useState(savedName || null);
  const [nameInput, setNameInput] = useState("");
  const [room, setRoom] = useState("chat");
  const [data, setData] = useState(emptyState);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState(null); // last write failure, shown as a toast
  const [isAdmin, setIsAdmin] = useState(false);

  const dataRef = useRef(emptyState);
  const writeInFlight = useRef(0);
  const lastWriteAt = useRef(0);

  useEffect(() => { dataRef.current = data; }, [data]);

  const load = useCallback(async () => {
    try {
      if (writeInFlight.current > 0) { setLoading(false); return; }
      if (Date.now() - lastWriteAt.current < 4000) { setLoading(false); return; }
      const res = await window.storage.get(STORE_KEY, true);
      if (writeInFlight.current > 0) { setLoading(false); return; }
      if (res && res.value) {
        const incoming = normalizeWeek(JSON.parse(res.value));
        setData(incoming);
        dataRef.current = incoming;
      }
    } catch (e) {
      // get() THROWS when the key doesn't exist yet — expected on first run.
      console.error("[warrior] load: could not read shared state (expected on first run):", e);
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    load();
    const id = setInterval(load, 8000);
    return () => clearInterval(id);
  }, [load]);

  // heartbeat: quietly mark this person as "here" while the app is open
  useEffect(() => {
    if (!name) return;
    const beat = async () => {
      try {
        if (writeInFlight.current > 0) return;
        writeInFlight.current += 1;
        const res = await window.storage.get(STORE_KEY, true);
        const cur = res && res.value ? normalizeWeek(JSON.parse(res.value)) : normalizeWeek({});
        const next = { ...cur, presence: { ...(cur.presence || {}), [name]: Date.now() } };
        await window.storage.set(STORE_KEY, JSON.stringify(next), true);
        dataRef.current = next;
        lastWriteAt.current = Date.now();
      } catch (e) {
        console.error("[warrior] presence heartbeat failed:", e);
      } finally {
        writeInFlight.current -= 1;
      }
    };
    beat();
    const id = setInterval(beat, 30000);
    return () => clearInterval(id);
  }, [name]);

  const mergeStates = (base, mine) => {
    const out = { ...base, ...mine };
    const listKeys = ["messages", "checkins", "prayers", "quiet", "scriptures", "moments"];
    for (const k of listKeys) {
      const a = Array.isArray(base[k]) ? base[k] : [];
      const b = Array.isArray(mine[k]) ? mine[k] : [];
      const byId = new Map();
      for (const item of a) if (item && item.id != null) byId.set(item.id, item);
      for (const item of b) if (item && item.id != null) byId.set(item.id, item);
      const merged = [...byId.values()];
      merged.sort((x, y) => (k === "messages" ? x.ts - y.ts : y.ts - x.ts));
      out[k] = merged;
    }
    out.members = dedupeMembers(Array.isArray(mine.members) ? mine.members : (base.members || []));
    out.reads = mine.reads !== undefined ? mine.reads : (base.reads || {});
    out.presence = mine.presence !== undefined ? mine.presence : (base.presence || {});
    return out;
  };

  const mutate = useCallback(async (changeFn) => {
    setSaving(true);
    writeInFlight.current += 1;
    try {
      let latest = null;
      try {
        const res = await window.storage.get(STORE_KEY, true);
        latest = res && res.value ? normalizeWeek(JSON.parse(res.value)) : null;
      } catch (e) {
        console.warn("[warrior] mutate: could not read latest before write (using local copy):", e);
        latest = null;
      }
      const base = normalizeWeek(latest || dataRef.current || emptyState);
      const mine = changeFn(base);
      const next = latest ? mergeStates(latest, mine) : mine;
      setData(next);
      dataRef.current = next;
      await window.storage.set(STORE_KEY, JSON.stringify(next), true);
      dataRef.current = next;
      lastWriteAt.current = Date.now();
      setSaveError(null);
    } catch (e) {
      console.error("[warrior] mutate: write to shared storage FAILED:", e);
      setSaveError(String((e && e.message) || e) || "Save failed");
    } finally {
      writeInFlight.current -= 1;
      setSaving(false);
    }
  }, []);

  const persist = useCallback(async (next) => {
    setData(next);
    setSaving(true);
    try {
      await window.storage.set(STORE_KEY, JSON.stringify(next), true);
      setSaveError(null);
    } catch (e) {
      console.error("[warrior] persist: write to shared storage FAILED:", e);
      setSaveError(String((e && e.message) || e) || "Save failed");
    }
    setSaving(false);
  }, []);

  const join = () => {
    const n = nameInput.trim().replace(/\s+/g, " ");
    if (!n) return;
    setName(n);
    try {
      if (window.localStorage) window.localStorage.setItem("warrior:myname", n);
    } catch (e) { /* private mode */ }
    // Membership + presence are added by the [name] effect below. Doing it only
    // there (not here too) avoids two concurrent writes both appending the name.
  };

  useEffect(() => {
    if (!name) return;
    mutate((d) => ({
      ...d,
      members: d.members.includes(name) ? d.members : [...d.members, name],
      presence: { ...(d.presence || {}), [name]: Date.now() },
    }));
    // eslint-disable-next-line
  }, [name]);

  const addMember = (raw) => {
    const n = (raw || "").trim().replace(/\s+/g, " ");
    if (!n) return;
    mutate((d) => (d.members.includes(n) ? d : { ...d, members: [...d.members, n] }));
  };

  const removeMember = (n) => {
    mutate((d) => {
      const reads = { ...(d.reads || {}) };
      delete reads[n];
      const presence = { ...(d.presence || {}) };
      delete presence[n];
      return { ...d, members: d.members.filter((m) => m !== n), reads, presence };
    });
  };

  const switchUser = () => {
    try { if (window.localStorage) window.localStorage.removeItem("warrior:myname"); } catch (e) {}
    setIsAdmin(false);
    setName(null);
    setNameInput("");
  };

  // Leader-only manual reset. Writes the cleared state DIRECTLY (no merge) so the
  // week's activity is truly wiped; the roster is kept. This replaces the old
  // automatic Tuesday wipe so data never disappears unless the leader chooses.
  const clearWeek = useCallback(async () => {
    setSaving(true);
    writeInFlight.current += 1;
    try {
      let latest = null;
      try {
        const res = await window.storage.get(STORE_KEY, true);
        latest = res && res.value ? JSON.parse(res.value) : null;
      } catch (e) {
        latest = null;
      }
      const members = dedupeMembers((latest && latest.members) || dataRef.current.members);
      const fresh = { ...emptyState, members, weekStart: currentWeekStart() };
      setData(fresh);
      dataRef.current = fresh;
      await window.storage.set(STORE_KEY, JSON.stringify(fresh), true);
      lastWriteAt.current = Date.now();
      setSaveError(null);
    } catch (e) {
      console.error("[warrior] clearWeek: reset FAILED:", e);
      setSaveError(String((e && e.message) || e) || "Reset failed");
    } finally {
      writeInFlight.current -= 1;
      setSaving(false);
    }
  }, []);

  if (loading) {
    return (
      <Shell>
        <div style={{ textAlign: "center", padding: "120px 0", color: PARCHMENT, opacity: 0.7, letterSpacing: "0.1em" }}>
          MUSTERING THE BAND…
        </div>
      </Shell>
    );
  }

  if (!name) {
    return (
      <Shell>
        <Enlist nameInput={nameInput} setNameInput={setNameInput} join={join} members={data.members} />
      </Shell>
    );
  }

  return (
    <Shell>
      <Header name={name} saving={saving} memberCount={data.members.length} isAdmin={isAdmin} members={data.members} presence={data.presence} />
      <Nav room={room} setRoom={setRoom} data={data} isAdmin={isAdmin} />
      <main style={{ maxWidth: 720, margin: "0 auto", padding: "0 20px 80px" }}>
        {room === "chat" && <Chat name={name} data={data} persist={persist} mutate={mutate} setRoom={setRoom} />}
        {room === "checkin" && <CheckIn name={name} data={data} persist={persist} mutate={mutate} />}
        {room === "quiet" && <QuietTime name={name} data={data} mutate={mutate} />}
        {room === "scripture" && <Scripture name={name} data={data} persist={persist} mutate={mutate} isAdmin={isAdmin} />}
        {room === "moments" && <Moments name={name} data={data} persist={persist} mutate={mutate} />}
        {room === "admin" && (
          <Admin name={name} data={data} isAdmin={isAdmin} setIsAdmin={setIsAdmin} addMember={addMember} removeMember={removeMember} switchUser={switchUser} setRoom={setRoom} clearWeek={clearWeek} />
        )}
      </main>
      {saveError && <SaveErrorToast msg={saveError} onClose={() => setSaveError(null)} />}
    </Shell>
  );
}

function SaveErrorToast({ msg, onClose }) {
  return (
    <div role="alert" style={{ position: "fixed", left: 16, right: 16, bottom: 16, maxWidth: 560, margin: "0 auto", background: "#2a201d", border: `1px solid ${ACCENT}`, borderRadius: 10, padding: "12px 14px", boxShadow: "0 8px 24px rgba(0,0,0,0.5)", zIndex: 50, display: "flex", alignItems: "flex-start", gap: 12 }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, letterSpacing: "0.06em", textTransform: "uppercase", color: ACCENT }}>
          ✗ That didn't save
        </div>
        <div style={{ fontSize: 13, color: PARCHMENT, marginTop: 3, lineHeight: 1.45 }}>
          The band may not see it. Check your connection and try again.
          <span style={{ display: "block", color: "#8a9499", marginTop: 4, fontSize: 12 }}>{msg}</span>
        </div>
      </div>
      <button onClick={onClose} aria-label="Dismiss" style={{ background: "none", border: "none", color: "#8a9499", fontSize: 18, cursor: "pointer", lineHeight: 1, padding: 2 }}>×</button>
    </div>
  );
}

function Shell({ children }) {
  return (
    <div style={{ minHeight: "100vh", background: INK, backgroundImage: "radial-gradient(circle at 20% 0%, #243036 0%, #141a1d 60%, #0e1214 100%)", fontFamily: "'Inter', system-ui, sans-serif", color: PARCHMENT, paddingTop: "env(safe-area-inset-top, 0px)", paddingLeft: "env(safe-area-inset-left, 0px)", paddingRight: "env(safe-area-inset-right, 0px)", overflowX: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=Crimson+Pro:ital@0;1&display=swap');
        * { box-sizing: border-box; }
        html, body { margin: 0; max-width: 100%; overflow-x: hidden; }
        #root { overflow-x: hidden; }
        ::placeholder { color: #8a9499; }
        img, svg, video { max-width: 100%; height: auto; }
        input, textarea, select, button { max-width: 100%; }
        h1, h2, h3, p, span, div { overflow-wrap: anywhere; word-break: break-word; }
        button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid ${ACCENT}; outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
      `}</style>
      {children}
    </div>
  );
}

function Enlist({ nameInput, setNameInput, join, members }) {
  return (
    <div style={{ maxWidth: 460, margin: "0 auto", padding: "72px 24px" }}>

function Chat({ name, data, persist, mutate, setRoom }) {
  const [text, setText] = useState("");
  const messages = data.messages || [];
  const today = dayKey();
  const myReads = (data.reads && data.reads[name]) || [];
  const readToday = myReads.includes(today);
  const toggleRead = () => {
    mutate((d) => {
      const reads = { ...(d.reads || {}) };
      const mine = new Set(reads[name] || []);
      if (mine.has(today)) mine.delete(today); else mine.add(today);
      reads[name] = [...mine].sort();
      return { ...d, reads };
    });
  };
  const roster = data.members || [];
  const readersToday = roster.filter((m) => ((data.reads || {})[m] || []).includes(today)).length;
  const send = () => {
    if (!text.trim()) return;
    const entry = { id: Date.now(), author: name, text: text.trim(), ts: Date.now() };
    mutate((d) => ({ ...d, messages: [...(d.messages || []), entry] }));
    setText("");
  };
  const ordered = [...messages].sort((a, b) => a.ts - b.ts);
  return (
    <>
      <RoomTitle title="Band Chat" verse="Encourage one another and build each other up. — 1 Thess. 5:11" />
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, background: readToday ? "#1c2c22" : "#2a201d", border: `1px solid ${readToday ? "#3f7d4a" : ACCENT}`, borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, letterSpacing: "0.08em", textTransform: "uppercase", color: PARCHMENT }}>
            {readToday ? "✓ You're in the Word today" : "Have you been in the Word today?"}
          </div>
          <button onClick={() => setRoom && setRoom("checkin")} style={{ background: "none", border: "none", padding: 0, marginTop: 2, color: "#8a9499", fontSize: 12, cursor: "pointer", textDecoration: "underline", fontFamily: "inherit" }}>
            {readersToday} of {roster.length || 1} read today — see the band ›
          </button>
        </div>
        <button onClick={toggleRead} style={{ ...primaryBtn, width: "auto", padding: "10px 16px", flexShrink: 0, background: readToday ? "#3f7d4a" : ACCENT }}>
          {readToday ? "✓ Read" : "I read today"}
        </button>
      </div>
      <div style={{ marginBottom: 16 }}>
        {ordered.length === 0 && <Empty text="No messages yet. Say the first word." />}
        {ordered.map((m, i) => {
          const mine = m.author === name;
          const prev = ordered[i - 1];
          const sameAuthor = prev && prev.author === m.author && m.ts - prev.ts < 5 * 60 * 1000;
          return (
            <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start", marginTop: sameAuthor ? 3 : 12, width: "100%" }}>
              {!sameAuthor && <span style={{ fontSize: 11, color: "#8a9499", margin: "0 4px 3px", fontWeight: 600 }}>{mine ? "You" : m.author}</span>}
              <div style={{ maxWidth: "78%", background: mine ? ACCENT : PARCHMENT, color: mine ? "#fff" : INK, borderRadius: 14, borderBottomRightRadius: mine ? 4 : 14, borderBottomLeftRadius: mine ? 14 : 4, padding: "9px 13px", fontSize: 15, lineHeight: 1.4, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{m.text}</div>
              <span style={{ fontSize: 10, color: "#6b7178", margin: "3px 4px 0" }}>{timeAgo(m.ts)}</span>
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
        <textarea value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder="Message the band…" style={{ ...textareaStyle, minHeight: 46, margin: 0, flex: 1 }} />
        <button onClick={send} style={{ ...primaryBtn, width: "auto", padding: "13px 20px" }}>Send</button>
      </div>
      <p style={{ fontSize: 11, color: "#6b7178", marginTop: 8, textAlign: "center" }}>Enter to send · Shift+Enter for a new line</p>
    </>
  );
}

const MOODS = ["Strong", "Steady", "Struggling", "Need backup"];

function CheckIn({ name, data, persist, mutate }) {
  const [mood, setMood] = useState("Steady");
  const [note, setNote] = useState("");
  const today = dayKey();
  const myReads = (data.reads && data.reads[name]) || [];
  const readToday = myReads.includes(today);
  const toggleRead = () => {
    mutate((d) => {
      const reads = { ...(d.reads || {}) };
      const mine = new Set(reads[name] || []);
      if (mine.has(today)) mine.delete(today); else mine.add(today);
      reads[name] = [...mine].sort();
      return { ...d, reads };
    });
  };
  const post = () => {
    if (!note.trim()) return;
    const entry = { id: Date.now(), author: name, mood, note: note.trim(), ts: Date.now(), nods: [] };
    mutate((d) => ({ ...d, checkins: [entry, ...(d.checkins || [])] }));
    setNote(""); setMood("Steady");

  const nod = (id) => {
    mutate((d) => ({ ...d, checkins: (d.checkins || []).map((c) => c.id === id ? { ...c, nods: c.nods.includes(name) ? c.nods.filter((n) => n !== name) : [...c.nods, name] } : c) }));
  };
  const moodColor = { Strong: "#3f7d4a", Steady: STEEL, Struggling: "#b5862f", "Need backup": ACCENT };
  return (
    <>
      <RoomTitle title="Weekly Check-In" verse="As iron sharpens iron, so one man sharpens another. — Prov. 27:17" />
      <DailyRead name={name} data={data} readToday={readToday} toggleRead={toggleRead} myStreak={streakOf(myReads)} />
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginBottom: 24 }}>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 4 }}>
          {MOODS.map((m) => (
            <button key={m} onClick={() => setMood(m)} style={{ ...smallBtn, color: mood === m ? "#fff" : "#b9b09a", border: `1px solid ${mood === m ? moodColor[m] : "#34424a"}`, background: mood === m ? moodColor[m] : "transparent" }}>{m}</button>
          ))}
        </div>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: ACCENT, margin: "14px 0 6px" }}>Prayer Request</div>
        <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="What can the band lift up for you this week?" style={textareaStyle} />
        <button onClick={post} style={primaryBtn}>Post Prayer Request</button>
      </div>
      {data.checkins.length === 0 && <Empty text="No check-ins yet. Be the first to report in." />}
      {data.checkins.map((c) => (
        <div key={c.id} style={cardStyle}>
          <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.06em", textTransform: "uppercase", color: "#fff", background: moodColor[c.mood] || STEEL, padding: "3px 9px", borderRadius: 5 }}>{c.mood}</span>
          <p style={{ margin: "12px 0 0", fontSize: 15, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{c.note}</p>
          <Byline author={c.author} ts={c.ts} />
          <button onClick={() => nod(c.id)} style={{ ...smallBtn, marginTop: 8, color: c.nods.includes(name) ? ACCENT : STEEL, borderColor: c.nods.includes(name) ? ACCENT : STEEL }}>
            ✓ I've got your back{c.nods.length ? ` · ${c.nods.length}` : ""}
          </button>
        </div>
      ))}
    </>
  );

// The six Quiet Time prompts. `short` renders a single-line input (the verse
// reference); the rest are reflection textareas.
const QT_FIELDS = [
  { key: "ref", q: "Scripture reference", label: "Scripture reference", short: true, placeholder: "e.g. John 3:16-17" },
  { key: "commandment", q: "Is there a commandment to obey?", label: "Commandment to obey", placeholder: "Write what you hear…" },
  { key: "promise", q: "Is there a promise to claim?", label: "Promise to claim", placeholder: "Write what you hear…" },
  { key: "sin", q: "Is there a sin to avoid?", label: "Sin to avoid", placeholder: "Write what you hear…" },
  { key: "application", q: "Is there an application to make?", label: "Application to make", placeholder: "Write what you hear…" },
  { key: "god", q: "Is there something new about God?", label: "Something new about God", placeholder: "Write what you hear…" },
];
const qtPromptStyle = { display: "block", fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.06em", color: "#9aa3a8", textTransform: "uppercase", marginBottom: 6 };
const qtAnsLabelStyle = { fontFamily: "'Oswald', sans-serif", fontSize: 11, letterSpacing: "0.08em", color: ACCENT, textTransform: "uppercase", marginBottom: 3 };

function QuietTime({ name, data, mutate }) {
  const blank = { ref: "", commandment: "", promise: "", sin: "", application: "", god: "" };
  const [form, setForm] = useState(blank);
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const hasAny = QT_FIELDS.some((f) => (form[f.key] || "").trim());
  const post = () => {
    if (!hasAny) return;
    const entry = { id: Date.now(), author: name, ts: Date.now() };
    for (const f of QT_FIELDS) entry[f.key] = (form[f.key] || "").trim();
    mutate((d) => ({ ...d, quiet: [entry, ...(d.quiet || [])] }));
    setForm(blank);
  };
  const list = data.quiet || [];
  return (
    <>
      <RoomTitle title="Quiet Time" verse="Be still, and know that I am God. — Psalm 46:10" />
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginBottom: 24 }}>
        {QT_FIELDS.map((f, i) => (
          <div key={f.key} style={{ marginBottom: 12 }}>
            <label style={qtPromptStyle}>{i + 1}. {f.q}</label>
            {f.short
              ? <input value={form[f.key]} onChange={(e) => set(f.key, e.target.value)} placeholder={f.placeholder} style={{ ...inputStyle, margin: 0 }} />
              : <textarea value={form[f.key]} onChange={(e) => set(f.key, e.target.value)} placeholder={f.placeholder} style={{ ...textareaStyle, minHeight: 64 }} />}
          </div>
        ))}
        <button onClick={post} disabled={!hasAny} style={{ ...primaryBtn, opacity: hasAny ? 1 : 0.5 }}>Save Quiet Time</button>
      </div>
      {list.length === 0 && <Empty text="No quiet-time entries yet. Sit with the Word and write what you hear." />}
      {list.map((e) => (
        <div key={e.id} style={{ ...cardStyle, borderLeft: `4px solid ${ACCENT}` }}>
          {QT_FIELDS.filter((f) => (e[f.key] || "").trim()).map((f) => (
            <div key={f.key} style={{ marginBottom: 8 }}>
              <div style={qtAnsLabelStyle}>{f.label}</div>
              <div style={{ fontSize: 15, lineHeight: 1.5, whiteSpace: "pre-wrap", color: PARCHMENT }}>{e[f.key]}</div>
            </div>
          ))}
          <Byline author={e.author} ts={e.ts} />
        </div>
      ))}
    </>
  );
}

function Scripture({ name, data, persist, mutate, isAdmin }) {
  const [showForm, setShowForm] = useState(false);
  const [picked, setPicked] = useState("");
  const [ref, setRef] = useState("");
  const [verse, setVerse] = useState("");
  const usedRefs = (data.scriptures || []).map((s) => s.ref);
  const postVerse = (r, t) => {
    if (!r.trim() || !t.trim()) return;
    const entry = { id: Date.now(), author: name, ref: r.trim(), verse: t.trim(), ts: Date.now(), memorized: [] };
    mutate((d) => ({ ...d, scriptures: [entry, ...(d.scriptures || [])] }));
    setPicked(""); setRef(""); setVerse(""); setShowForm(false);
  };
  const postPicked = () => {
    if (picked === "custom") return postVerse(ref, verse);
    const v = EMAW_VERSES[Number(picked)];
    if (v) postVerse(v.ref, v.text);
  };
  const toggleMemorized = (id) => mutate((d) => ({ ...d, scriptures: (d.scriptures || []).map((s) => s.id === id ? { ...s, memorized: s.memorized.includes(name) ? s.memorized.filter((n) => n !== name) : [...s.memorized, name] } : s) }));
  const verses = data.scriptures || [];
  const current = verses[0];
  const past = verses.slice(1);
  return (
    <>
      <RoomTitle title="Scripture Memory" verse="I have hidden your word in my heart. — Psalm 119:11" />
      {isAdmin && (
        <div style={{ marginBottom: 20 }}>
          {!showForm ? (
            <button onClick={() => setShowForm(true)} style={{ ...primaryBtn, width: "auto", padding: "10px 18px" }}>
              ★ {current ? "Set a new verse" : "Set this week's verse"}
            </button>
          ) : (
            <div style={{ background: "#1f282c", borderRadius: 10, padding: 16 }}>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: ACCENT, marginBottom: 10 }}>★ Leader · choose this week's verse</div>
              <select value={picked} onChange={(e) => setPicked(e.target.value)} style={{ ...inputStyle, appearance: "auto" }}>
                <option value="">Select from Every Man a Warrior…</option>
                {[1, 2, 3].map((bk) => (
                  <optgroup key={bk} label={`Book ${bk}`}>
                    {EMAW_VERSES.filter((v) => v.book === bk).map((v) => {
                      const idx = EMAW_VERSES.indexOf(v);
                      const done = usedRefs.includes(v.ref);
                      return <option key={idx} value={idx}>{v.n}. {v.ref}{done ? "  ✓ used" : ""}</option>;
                    })}
                  </optgroup>
                ))}
                <option value="custom">✎ Enter a custom verse…</option>
              </select>
              {picked !== "" && picked !== "custom" && EMAW_VERSES[Number(picked)] && (
                <div style={{ background: "#11171a", border: "1px solid #34424a", borderRadius: 8, padding: "12px 14px", margin: "4px 0 14px" }}>
                  <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.06em", textTransform: "uppercase", color: ACCENT }}>{EMAW_VERSES[Number(picked)].ref}</div>
                  <p style={{ fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 16, lineHeight: 1.4, margin: "6px 0 0", color: PARCHMENT }}>“{EMAW_VERSES[Number(picked)].text}”</p>
                </div>
              )}
              {picked === "custom" && (
                <>
                  <input value={ref} onChange={(e) => setRef(e.target.value)} placeholder="Reference — e.g. Joshua 1:9" style={inputStyle} />
                  <textarea value={verse} onChange={(e) => setVerse(e.target.value)} placeholder="Type the verse text…" style={textareaStyle} />
                </>
              )}
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={postPicked} style={{ ...primaryBtn, opacity: picked === "" ? 0.5 : 1 }} disabled={picked === ""}>Post Verse</button>
                <button onClick={() => { setShowForm(false); setPicked(""); }} style={{ ...smallBtn, padding: "0 16px", color: "#b9b09a", borderColor: "#34424a" }}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}
      {!current ? (
        <Empty text="The weekly memory verse will appear here once your leader sets it." />
      ) : (
        <VerseCard s={current} name={name} members={data.members} toggleMemorized={toggleMemorized} hero />
      )}
      {past.length > 0 && (
        <>
          <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, letterSpacing: "0.12em", textTransform: "uppercase", color: "#6b7178", margin: "30px 0 12px" }}>Previous Verses</h3>
          {past.map((s) => <VerseCard key={s.id} s={s} name={name} members={data.members} toggleMemorized={toggleMemorized} />)}
        </>
      )}
    </>
  );
}

function VerseCard({ s, name, members, toggleMemorized, hero }) {
  const done = s.memorized.includes(name);
  const count = s.memorized.length;
  const total = members.length || 1;
  const pct = Math.round((count / total) * 100);
  const everyone = count >= total && total > 0;
  return (
    <div style={{ ...cardStyle, ...(hero ? { padding: "26px 24px", boxShadow: "0 4px 0 rgba(0,0,0,0.3)", borderTop: `4px solid ${ACCENT}` } : { background: PARCHMENT_DK, opacity: 0.95 }) }}>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: hero ? 16 : 13, letterSpacing: "0.08em", textTransform: "uppercase", color: ACCENT }}>{s.ref}</div>
      <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: hero ? 26 : 18, lineHeight: 1.4, margin: "10px 0 0", fontStyle: "italic" }}>“{s.verse}”</p>
      <div style={{ marginTop: hero ? 22 : 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
          <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.06em", textTransform: "uppercase", color: everyone ? "#3f7d4a" : STEEL }}>
            {everyone ? "✦ The whole band has it" : `${count} of ${total} memorized`}
          </span>
          <span style={{ fontSize: 12, color: "#6b7178" }}>{pct}%</span>
        </div>
        <div style={{ height: 8, background: "#cabfa6", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", background: everyone ? "#3f7d4a" : ACCENT, transition: "width 0.4s ease" }} />
        </div>
        {count > 0 && (
          <div style={{ marginTop: 8, fontSize: 12, color: "#6b7178", lineHeight: 1.5 }}>
            <span style={{ color: "#3f7d4a", fontWeight: 600 }}>✓</span>{" "}{s.memorized.map((m) => (m === name ? "You" : m)).join(", ")}
          </div>
        )}
      </div>
      <button onClick={() => toggleMemorized(s.id)} style={{ ...smallBtn, marginTop: 14, padding: hero ? "9px 18px" : "5px 12px", fontSize: hero ? 14 : 12, color: done ? "#fff" : STEEL, background: done ? "#3f7d4a" : "transparent", borderColor: done ? "#3f7d4a" : STEEL }}>
        {done ? "✓ I've memorized it" : "I've memorized it"}
      </button>
    </div>
  );
}

function Moments({ name, data, persist, mutate }) {
  const [text, setText] = useState("");
  const post = () => {
    if (!text.trim()) return;
    const entry = { id: Date.now(), author: name, text: text.trim(), ts: Date.now(), amens: [] };
    mutate((d) => ({ ...d, moments: [entry, ...(d.moments || [])] }));
    setText("");
  };
  const amen = (id) => mutate((d) => ({ ...d, moments: (d.moments || []).map((m) => m.id === id ? { ...m, amens: m.amens.includes(name) ? m.amens.filter((n) => n !== name) : [...m.amens, name] } : m) }));
  return (
    <>
      <RoomTitle title="God Moments" verse="I will declare the works of the Lord. — Psalm 118:17" />
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginBottom: 24 }}>
        <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="Where did you see God move this week?" style={textareaStyle} />
        <button onClick={post} style={primaryBtn}>Share the Moment</button>
      </div>
      {data.moments.length === 0 && <Empty text="No moments shared yet. Tell the band what God did." />}
      {data.moments.map((m) => (
        <div key={m.id} style={{ ...cardStyle, borderLeft: `4px solid ${ACCENT}` }}>
          <p style={{ margin: 0, fontSize: 15, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{m.text}</p>
          <Byline author={m.author} ts={m.ts} />
          <button onClick={() => amen(m.id)} style={{ ...smallBtn, marginTop: 8, color: m.amens.includes(name) ? ACCENT : STEEL, borderColor: m.amens.includes(name) ? ACCENT : STEEL }}>
            🔥 Amen{m.amens.length ? ` · ${m.amens.length}` : ""}
          </button>
        </div>
      ))}
    </>
  );
}

function Empty({ text }) {
  return <div style={{ textAlign: "center", padding: "40px 20px", color: "#6b7178", fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontSize: 16 }}>{text}</div>;
}

function Admin({ name, data, isAdmin, setIsAdmin, addMember, removeMember, switchUser, setRoom, clearWeek }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const [newName, setNewName] = useState("");
  const [confirm, setConfirm] = useState(null);
  const [weekConfirm, setWeekConfirm] = useState(false);
  const [diag, setDiag] = useState(null);
  const [diagBusy, setDiagBusy] = useState(false);
  const runDiag = async () => {
    setDiagBusy(true); setDiag(null);
    try {
      const r = window.WARRIOR_DIAG ? await window.WARRIOR_DIAG() : { ok: false, msg: "diag unavailable" };
      setDiag(r);
    } catch (e) {
      setDiag({ ok: false, msg: String((e && e.message) || e) });
    }
    setDiagBusy(false);
  };
  const tryUnlock = () => {
    if (pin === ADMIN_PIN) { setIsAdmin(true); setErr(false); setPin(""); } else { setErr(true); }
  };
  if (!isAdmin) {
    return (
      <>
        <RoomTitle title="Leader Access" verse="To whom much is given, much will be required. — Luke 12:48" />
        <div style={{ background: "#1f282c", borderRadius: 10, padding: 20, maxWidth: 320, margin: "0 auto" }}>
          <label style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.12em", color: "#9aa3a8", textTransform: "uppercase" }}>Enter 4-digit PIN</label>
          <input value={pin} onChange={(e) => { setPin(e.target.value.replace(/\D/g, "").slice(0, 4)); setErr(false); }} onKeyDown={(e) => e.key === "Enter" && tryUnlock()} type="password" inputMode="numeric" placeholder="••••" style={{ ...inputStyle, textAlign: "center", letterSpacing: "0.5em", fontSize: 22 }} />
          {err && <div style={{ color: ACCENT, fontSize: 13, marginBottom: 10 }}>Wrong PIN. Try again.</div>}
          <button onClick={tryUnlock} style={primaryBtn}>Unlock</button>
          <p style={{ fontSize: 12, color: "#6b7178", marginTop: 14, lineHeight: 1.5 }}>The leader PIN opens verse-setting and member management. Ask whoever set up the band if you don't have it.</p>
        </div>
      </>
    );
  }
  const roster = data.members || [];
  return (
    <>
      <RoomTitle title="Leader Tools" verse="Shepherd the flock of God that is among you. — 1 Peter 5:2" />
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginBottom: 16 }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: ACCENT, marginBottom: 10 }}>Shared-storage check</div>
        <button onClick={runDiag} disabled={diagBusy} style={{ ...primaryBtn, width: "auto", padding: "10px 18px", opacity: diagBusy ? 0.6 : 1 }}>{diagBusy ? "Testing…" : "Test connection"}</button>
        {diag && (
          <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 8, background: diag.ok ? "#1c2c22" : "#2a201d", border: `1px solid ${diag.ok ? "#3f7d4a" : ACCENT}`, fontSize: 13, lineHeight: 1.5, color: PARCHMENT }}>
            {diag.ok ? "✓ Saving works — the group shares one wall." : <>✗ Not saving. Stage: <b>{diag.stage}</b><br />{diag.msg}</>}
          </div>
        )}
        <p style={{ fontSize: 11, color: "#6b7178", marginTop: 10, lineHeight: 1.5 }}>Tap this if posts seem to vanish. Green means saving works. If it's red, screenshot it — the message says exactly what to fix.</p>
      </div>
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginBottom: 16 }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: ACCENT, marginBottom: 10 }}>Add a man to the band</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { addMember(newName); setNewName(""); } }} placeholder="Name" style={{ ...inputStyle, margin: 0, flex: 1 }} />
          <button onClick={() => { addMember(newName); setNewName(""); }} style={{ ...primaryBtn, width: "auto", padding: "0 18px" }}>Add</button>
        </div>
      </div>
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16 }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: "#9aa3a8", marginBottom: 12 }}>The band · {roster.length}</div>
        {roster.length === 0 && <div style={{ fontSize: 13, color: "#6b7178" }}>No one has joined yet.</div>}
        {roster.map((m) => (
          <div key={m} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid #2b363b" }}>
            <span style={{ color: PARCHMENT, fontSize: 15 }}>{m}{m === name && <span style={{ color: "#6b7178", fontSize: 12 }}> · you</span>}</span>
            {confirm === m ? (
              <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <span style={{ fontSize: 12, color: "#9aa3a8" }}>Remove?</span>
                <button onClick={() => { removeMember(m); setConfirm(null); }} style={{ ...smallBtn, color: "#fff", background: ACCENT, borderColor: ACCENT }}>Yes</button>
                <button onClick={() => setConfirm(null)} style={{ ...smallBtn, color: "#b9b09a", borderColor: "#34424a" }}>No</button>
              </span>
            ) : (
              <button onClick={() => setConfirm(m)} style={{ ...smallBtn, color: "#b9b09a", borderColor: "#34424a" }}>Remove</button>
            )}
          </div>
        ))}
        <p style={{ fontSize: 11, color: "#6b7178", marginTop: 12, lineHeight: 1.5 }}>Removing a man clears his reading log and presence. He can rejoin any time by opening the link and typing his name.</p>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 16, flexWrap: "wrap" }}>
        <button onClick={() => setRoom("scripture")} style={{ ...primaryBtn, width: "auto", padding: "11px 18px" }}>★ Set this week's verse</button>
      </div>
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginTop: 16, border: "1px solid #3a2a26" }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: ACCENT, marginBottom: 10 }}>Start a fresh week</div>
        {weekConfirm ? (
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: PARCHMENT }}>Clear all activity for everyone? This can't be undone.</span>
            <button onClick={() => { clearWeek(); setWeekConfirm(false); }} style={{ ...smallBtn, color: "#fff", background: ACCENT, borderColor: ACCENT }}>Yes, clear it</button>
            <button onClick={() => setWeekConfirm(false)} style={{ ...smallBtn, color: "#b9b09a", borderColor: "#34424a" }}>Cancel</button>
          </div>
        ) : (
          <button onClick={() => setWeekConfirm(true)} style={{ ...primaryBtn, width: "auto", padding: "11px 18px", background: STEEL }}>Start fresh week</button>
        )}
        <p style={{ fontSize: 11, color: "#6b7178", marginTop: 10, lineHeight: 1.5 }}>Wipes chat, check-ins, prayers, quiet-time entries, scriptures and God-moments for the whole band, keeping the roster. Nothing resets automatically anymore — only this button clears the wall.</p>
      </div>
      <div style={{ background: "#1f282c", borderRadius: 10, padding: 16, marginTop: 16 }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: "#9aa3a8", marginBottom: 10 }}>Leadership</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button onClick={() => setIsAdmin(false)} style={{ ...primaryBtn, width: "auto", padding: "11px 18px", background: STEEL }}>Sign out of leader role</button>
          {switchUser && <button onClick={switchUser} style={{ ...smallBtn, padding: "0 16px", color: "#b9b09a", borderColor: "#34424a" }}>Switch device login</button>}
        </div>
        <p style={{ fontSize: 11, color: "#6b7178", marginTop: 10, lineHeight: 1.5 }}>Signing out locks the leader tools again. You stay in the band as {name} — you'll just need the PIN to manage verses or members next time.</p>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
