# Static site (no build step) + serverless storage backend.
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA: serve index.html for any non-function, non-asset path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
